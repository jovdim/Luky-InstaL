<!DOCTYPE html>
<html lang="sk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Navigation -->
  <nav id="nav_1" data-section="nav_1" class="main-nav">
    <div class="nav-container">
      <a href="#hero_1" class="nav-logo" data-section="nav_1">
        <img src="logo.png" alt="Luky InstaL" data-field="logo_image" style="height: 48px; width: auto;">
      </a>
      <button class="nav-toggle" aria-label="Menu"><span></span><span></span><span></span></button>
      <ul class="nav-links" data-section="nav_1" data-field="links"></ul>
      <a href="tel:+421908420409" class="nav-cta btn btn-primary btn-sm">0908 420 409</a>
    </div>
  </nav>

  <!-- Hero: Modern full background -->
  <section id="hero_1" data-section="hero_1" class="hero">
    <img data-section="hero_1" data-field="background_image" class="hero-bg-img" src="" alt="Luky Instal Backgorund" loading="lazy">
    <div class="hero-overlay"></div>
    <div class="hero-inner">
      <div class="hero-text animate-on-scroll text-center">
        <span class="hero-badge" data-section="hero_1" data-field="hero_badge"></span>
        <h1 data-section="hero_1" data-field="headline"></h1>
        <p class="hero-sub" data-section="hero_1" data-field="subheadline"></p>
        <div class="hero-buttons center-buttons">
          <a class="btn btn-primary btn-lg" data-section="hero_1" data-field="cta_text" href="tel:+421908420409"></a>
          <a class="btn btn-ghost" data-section="hero_1" data-field="cta_secondary_text" href="#services_1"></a>
        </div>
        <div class="hero-trust center-trust" data-section="hero_1" data-field="trust_badges"></div>
      </div>
    </div>
  </section>

  <!-- About: Card-based with highlights -->
  <section id="about_1" data-section="about_1" class="section about animate-on-scroll">
    <div class="container">
      <div class="about-layout">
        <div class="about-visual">
          <div class="about-img-wrapper">
            <img data-section="about_1" data-field="image" src="" alt="O spoločnosti" loading="lazy" class="about-img-main">
          </div>
          <div class="about-highlights" data-section="about_1" data-field="highlights"></div>
        </div>
        <div class="about-text">
          <span class="section-tag">O spoločnosti</span>
          <h2 data-section="about_1" data-field="headline"></h2>
          <p data-section="about_1" data-field="text"></p>
          <p data-section="about_1" data-field="text_secondary"></p>
          <a href="#contact_1" class="btn btn-primary">Kontaktujte nás</a>
        </div>
      </div>
    </div>
  </section>



  <!-- Services: Alternating cards with big images -->
  <section id="services_1" data-section="services_1" class="section services animate-on-scroll">
    <div class="container">
      <div class="section-header">
        <span class="section-tag">Služby</span>
        <h2 data-section="services_1" data-field="headline"></h2>
        <p data-section="services_1" data-field="subheadline"></p>
      </div>
      <div class="services-masonry" data-section="services_1" data-field="items"></div>
    </div>
  </section>



  <!-- Gallery: Bento grid -->
  <section id="gallery_1" data-section="gallery_1" class="section gallery animate-on-scroll">
    <div class="container">
      <div class="section-header">
        <span class="section-tag">Galéria</span>
        <h2 data-section="gallery_1" data-field="headline"></h2>
        <p data-section="gallery_1" data-field="subheadline"></p>
      </div>
      <div class="bento-grid" data-section="gallery_1" data-field="items"></div>
    </div>
  </section>



  <!-- CTA Banner -->
  <section id="cta_1" data-section="cta_1" class="section cta-modern animate-on-scroll">
    <div class="container">
      <div class="cta-card">
        <div class="cta-text">
          <h2 data-section="cta_1" data-field="headline"></h2>
          <p data-section="cta_1" data-field="text"></p>
        </div>
        <a class="btn btn-primary btn-lg" data-section="cta_1" data-field="cta_text" href="tel:+421908420409"></a>
      </div>
    </div>
  </section>



  <!-- Contact -->
  <section id="contact_1" data-section="contact_1" class="section contact animate-on-scroll">
    <div class="container">
      <div class="contact-layout">
        <div class="contact-left">
          <span class="section-tag">Kontakt</span>
          <h2 data-section="contact_1" data-field="headline"></h2>
          <p class="contact-intro" data-section="contact_1" data-field="subheadline"></p>
          <div class="contact-details">
            <a href="tel:+421908420409" class="contact-detail-item">
              <div class="contact-detail-icon"><svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/></svg></div>
              <div><strong>Telefón</strong><span data-section="contact_1" data-field="phone"></span></div>
            </a>
            <a href="mailto:lukas.bujnak79@gmail.com" class="contact-detail-item">
              <div class="contact-detail-icon"><svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg></div>
              <div><strong>Email</strong><span data-section="contact_1" data-field="email"></span></div>
            </a>
            <div class="contact-detail-item">
              <div class="contact-detail-icon"><svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg></div>
              <div><strong>Adresa</strong><span data-section="contact_1" data-field="address"></span></div>
            </div>
            <div class="contact-detail-item">
              <div class="contact-detail-icon"><svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg></div>
              <div><strong>Pracovná doba</strong><span data-section="contact_1" data-field="hours"></span></div>
            </div>
          </div>
        </div>
        <div class="contact-right">
          <form class="contact-form" onsubmit="event.preventDefault();">
            <h3>Napíšte nám</h3>
            <div class="form-row">
              <div class="form-group"><label for="name">Meno</label><input type="text" id="name" name="name" placeholder="Vaše meno" required></div>
              <div class="form-group"><label for="phone-input">Telefón</label><input type="tel" id="phone-input" name="phone" placeholder="+421..."></div>
            </div>
            <div class="form-group"><label for="email-input">Email</label><input type="email" id="email-input" name="email" placeholder="vas@email.sk" required></div>
            <div class="form-group"><label for="message">Správa</label><textarea id="message" name="message" rows="4" placeholder="Opíšte vašu požiadavku..." required></textarea></div>
            <button type="submit" class="btn btn-primary btn-full">Odoslať správu</button>
          </form>
        </div>
      </div>
    </div>
  </section>

  <!-- Footer -->
  <footer id="footer_1" data-section="footer_1" class="footer">
    <div class="container">
      <div class="footer-top">
        <div class="footer-brand">
          <img src="logo.png" alt="Luky InstaL" data-section="footer_1" data-field="logo_image" style="height: 48px; width: auto; margin-bottom: 12px; filter: brightness(0) invert(1);">

        </div>
        <div class="footer-links">
          <h4>Navigácia</h4>
          <ul data-section="footer_1" data-field="links"></ul>
        </div>
        <div class="footer-contact-info">
          <h4>Kontakt</h4>
          <p>Brezovica 082 74</p>
          <p><a href="tel:+421908420409">0908 420 409</a></p>
          <p><a href="mailto:lukas.bujnak79@gmail.com">lukas.bujnak79@gmail.com</a></p>
        </div>
        <div class="footer-social" data-section="footer_1" data-field="social"></div>
      </div>
      <div class="footer-bottom">
        <p data-section="footer_1" data-field="copyright_text"></p>
      </div>
    </div>
  </footer>

  <script src="script.js"></script>
